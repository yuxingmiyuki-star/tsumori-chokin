<!doctype html>
<html lang="ja">
<head>

<title>つもりキャッシュ</title>
<style>
  html, body, #root { height: 100%; margin: 0; }
  html, body { width: 100%; overscroll-behavior-y: none; }
  body { background: #0E1014; -webkit-font-smoothing: antialiased;
         font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  #loading { color: #7B818C; font-size: 13px; line-height:1.8; height: 100%;
             display: flex; align-items: center; justify-content: center; text-align:center;
             padding:0 24px; white-space:pre-wrap; }
  input, button, textarea { font-family: inherit; }
  input, textarea { font-size: 16px; } /* iOSの自動ズーム防止 */
  .nosb { scrollbar-width: none; }
  .nosb::-webkit-scrollbar { display: none; }
  /* iOS Safari: date入力の値を左寄せ・入力幅いっぱいに */
  input[type="date"] { min-width: 100%; }
  input[type="date"]::-webkit-date-and-time-value { text-align: left; margin: 0; }
  /* ホームのコンパクト行用: 右寄せ・幅自動 */
  input[type="date"].dateR { min-width: 0; width: auto; }
  input[type="date"].dateR::-webkit-date-and-time-value { text-align: right; }
  ::placeholder { color: #5A606B; }
</style>
<script>
  // 起動でコケたら原因を画面に出す（無言の読み込み中を防ぐ）
  function showErr(msg){ var r=document.getElementById('loading'); if(r){ r.textContent='起動エラー:\n'+msg; } }
  window.addEventListener('error', function(e){ showErr((e.message||'')+(e.filename?'\n'+e.filename:'')); });
  window.addEventListener('unhandledrejection', function(e){ var r=e.reason; showErr(r&&(r.message||r)||'読み込みに失敗'); });
</script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

<body>
<div id="root"><div id="loading">つもりキャッシュ を読み込み中…</div></div>
<script type="text/babel" data-type="module" data-presets="react">
import React from "https://esm.sh/react@18.3.1";
import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
import { useState, useEffect, useMemo } from "https://esm.sh/react@18.3.1";
import { PiggyBank, Wallet, Store, Home, Plus, X, Coffee, Utensils, ShoppingBag, Bus, Gamepad2, Heart, Sparkles, Settings, Download, Upload, Trash2, Check, Star, TrendingUp, TrendingDown, Gift, Pencil, ChevronRight, ChevronLeft, Bath, BookOpen, Wine, Cigarette, Smartphone, Plane, Shirt, Receipt, Coins, ArrowLeft, Cake, Music, Dumbbell, Car, Pizza, IceCream, Beer, GraduationCap, Palette, ListChecks, ShoppingCart, BarChart3, Clock, RotateCcw } from "https://esm.sh/lucide-react@0.383.0?deps=react@18.3.1";

/* ============================================================
   つもりキャッシュ — つもり貯金 × 家計簿 × ご褒美 × 満足度
   端末内(localStorage)に保存。サーバー不要・インストール不要。
   ============================================================ */

const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
const yen = (n) => "¥" + Math.round(n || 0).toLocaleString("ja-JP");
const todayISO = () => { const d = new Date(); return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10); };
const monthKey = (iso) => (iso || todayISO()).slice(0, 7);
const fmtDate = (iso) => { const [y, m, d] = iso.split("-"); return `${+m}/${+d}`; };
const fmtMonth = (mk) => { const [y, m] = mk.split("-"); return `${y}年${+m}月`; };
const shiftMonth = (mk, delta) => { const [y, m] = mk.split("-").map(Number); const d = new Date(y, m - 1 + delta, 1); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; };
// カレンダーのマス用の金額（円まで表示）
const yenCell = (n) => (n ? n.toLocaleString("ja-JP") + "円" : "");
// 日付文字列から今日までの経過日数
const daysAgo = (ds) => Math.floor((new Date(todayISO()) - new Date(ds)) / 86400000);
// 感情タグ（記録フォームの任意チップ／分析で自動集計）
const EMOTAGS = ["衝動", "ストレス", "ご褒美", "必要"];
const RESAT_MIN = 7, RESAT_MAX = 30; // 再評価の対象: 購入からこの日数の範囲

// アイコン：保存はキー文字列で行う（関数はJSON化できないため）
const ICONS = {
  coffee: Coffee, utensils: Utensils, pizza: Pizza, icecream: IceCream, cake: Cake, beer: Beer, wine: Wine,
  shopping: ShoppingBag, shirt: Shirt, bus: Bus, car: Car, plane: Plane, game: Gamepad2, music: Music,
  book: BookOpen, dumbbell: Dumbbell, bath: Bath, phone: Smartphone, cig: Cigarette, heart: Heart,
  gift: Gift, star: Star, sparkles: Sparkles, coins: Coins, receipt: Receipt, school: GraduationCap, store: Store, cart: ShoppingCart,
};
const Ic = ({ name, ...p }) => { const C = ICONS[name] || Receipt; return <C {...p} />; };
const ICON_KEYS = Object.keys(ICONS);

// ---- デザインスキン（10パターン）----
// 配色 + フォント + 角丸 + カードの質感(flat/outline/elevated/glass) を変えて見た目を大きく変える
const FONTS = {
  sans: `-apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif`,
  rounded: `"Hiragino Maru Gothic ProN", "Quicksand", "M PLUS Rounded 1c", -apple-system, "Hiragino Sans", system-ui, sans-serif`,
  serif: `"Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", Georgia, serif`,
  mono: `ui-monospace, "SF Mono", Menlo, "Hiragino Sans", monospace`,
  tight: `"Helvetica Neue", Arial, "Hiragino Sans", sans-serif`,
};
const RAD = {
  sharp: { card: 8, btn: 9, chip: 7, pill: 6, hero: 12, icon: 9, sheet: 16 },
  soft: { card: 16, btn: 13, chip: 20, pill: 8, hero: 20, icon: 11, sheet: 22 },
  round: { card: 22, btn: 16, chip: 24, pill: 12, hero: 26, icon: 15, sheet: 28 },
};

const SKINS = {
  midnight: { name: "ミッドナイト", mode: "dark", font: "sans", radius: "soft", surface: "elevated",
    pal: { bg: "#0E1014", card: "#171A21", card2: "#1F242E", modal: "#1B1F28", line: "#272D38", hi: "#EEF1F6", lo: "#8A92A0", gold: "#E7B84B", onGold: "#1A1305", pos: "#46C28E", neg: "#F0816A", scrim: "rgba(8,9,12,0.7)" } },
  graphite: { name: "グラファイト", mode: "dark", font: "tight", radius: "sharp", surface: "flat",
    pal: { bg: "#15171C", card: "#1C1F26", card2: "#242832", modal: "#1E222B", line: "#2C313C", hi: "#E8EBF0", lo: "#868D9B", gold: "#6E9BF0", onGold: "#06101F", pos: "#54C08C", neg: "#E8806E", scrim: "rgba(10,11,14,0.72)" } },
  ocean: { name: "オーシャン", mode: "dark", font: "sans", radius: "soft", surface: "glass",
    pal: { bg: "#091018", card: "rgba(18,34,52,0.66)", card2: "rgba(28,46,68,0.7)", modal: "#102134", line: "rgba(90,140,180,0.28)", hi: "#E6EEF8", lo: "#88A0BA", gold: "#46C7E8", onGold: "#04121E", pos: "#4FC9A6", neg: "#F08A78", scrim: "rgba(6,12,20,0.72)" } },
  neon: { name: "ネオン", mode: "dark", font: "rounded", radius: "round", surface: "elevated",
    pal: { bg: "#0B0712", card: "#171026", card2: "#241738", modal: "#1B1230", line: "#2E1F47", hi: "#F0EAFB", lo: "#9A8CB8", gold: "#C45CFF", onGold: "#1A0726", pos: "#3FE0B0", neg: "#FF6B9D", scrim: "rgba(8,4,16,0.74)" } },
  forest: { name: "フォレスト", mode: "dark", font: "sans", radius: "soft", surface: "outline",
    pal: { bg: "#0C140F", card: "#13201A", card2: "#1B2C23", modal: "#16241C", line: "#2A4034", hi: "#E6F2E9", lo: "#85A091", gold: "#8FD158", onGold: "#08220A", pos: "#5BC98A", neg: "#E89A5C", scrim: "rgba(6,12,8,0.72)" } },
  sakura: { name: "さくら", mode: "light", font: "rounded", radius: "round", surface: "elevated",
    pal: { bg: "#FBF1F4", card: "#FFFFFF", card2: "#F7E7EC", modal: "#FFFFFF", line: "#F0D8DF", hi: "#3E2A31", lo: "#A07E88", gold: "#E586A6", onGold: "#FFFFFF", pos: "#3FA888", neg: "#E07A6A", scrim: "rgba(58,42,48,0.32)" } },
  cream: { name: "クリーム", mode: "light", font: "serif", radius: "soft", surface: "elevated",
    pal: { bg: "#F6F2EA", card: "#FFFFFF", card2: "#EFE9DD", modal: "#FFFFFF", line: "#E5DDCC", hi: "#2E2A20", lo: "#8C8472", gold: "#C09A3F", onGold: "#FFFFFF", pos: "#3FA070", neg: "#D9764F", scrim: "rgba(46,42,34,0.3)" } },
  paper: { name: "ペーパー", mode: "light", font: "mono", radius: "sharp", surface: "outline",
    pal: { bg: "#EFE9DC", card: "#F8F3E8", card2: "#E9E1CD", modal: "#F8F3E8", line: "#D6CBAF", hi: "#3A352A", lo: "#8A8068", gold: "#B07A3C", onGold: "#FFFFFF", pos: "#4A8E5E", neg: "#C75D45", scrim: "rgba(40,36,28,0.34)" } },
  pastel: { name: "パステル", mode: "light", font: "rounded", radius: "round", surface: "flat",
    pal: { bg: "#F3F1FB", card: "#FFFFFF", card2: "#ECE9F8", modal: "#FFFFFF", line: "#E2DDF2", hi: "#3A3450", lo: "#9189AE", gold: "#8A7DE5", onGold: "#FFFFFF", pos: "#46C2A0", neg: "#F38AA0", scrim: "rgba(40,36,60,0.3)" } },
  mono: { name: "モノクロ", mode: "light", font: "tight", radius: "sharp", surface: "outline",
    pal: { bg: "#F7F7F5", card: "#FFFFFF", card2: "#EFEFED", modal: "#FFFFFF", line: "#15151500", hi: "#0A0A0A", lo: "#6B6B6B", gold: "#E5342B", onGold: "#FFFFFF", pos: "#1A8A4A", neg: "#E5342B", scrim: "rgba(0,0,0,0.42)" } },
};
// モノクロは枠線を濃い黒にしたいので個別指定
SKINS.mono.pal.line = "#161616";

function resolveSkin(key) {
  const sk = SKINS[key] || SKINS.midnight;
  const p = sk.pal;
  const R = RAD[sk.radius] || RAD.soft;
  const dark = sk.mode === "dark";
  let bd, elev, glass = "none";
  if (sk.surface === "flat") { bd = `1px solid ${p.line}`; elev = "none"; }
  else if (sk.surface === "outline") { bd = `1.5px solid ${p.line}`; elev = "none"; }
  else if (sk.surface === "glass") { bd = `1px solid ${p.line}`; elev = dark ? "0 6px 22px rgba(0,0,0,0.4)" : "0 6px 20px rgba(0,0,0,0.12)"; glass = "blur(14px) saturate(1.25)"; }
  else { bd = `1px solid ${p.line}`; elev = dark ? "0 3px 14px rgba(0,0,0,0.32)" : "0 6px 18px rgba(70,60,50,0.09)"; } // elevated
  return { ...p, font: FONTS[sk.font] || FONTS.sans, R, dark, bd, elev, cardBg: p.card, glass, glow: key === "neon" };
}

const DEFAULT_CATS = [
  { id: "food", name: "食費", icon: "utensils" },
  { id: "cafe", name: "カフェ", icon: "coffee" },
  { id: "daily", name: "日用品", icon: "shopping" },
  { id: "transit", name: "交通", icon: "bus" },
  { id: "hobby", name: "趣味", icon: "game" },
  { id: "social", name: "交際", icon: "wine" },
  { id: "beauty", name: "美容", icon: "bath" },
  { id: "other", name: "その他", icon: "receipt" },
];

const SAVE_KEY = "tsumori-cash:v1";
const SCHEMA = 1;

const seed = () => ({
  v: SCHEMA,
  settings: { theme: "midnight", coolDays: 7, startCash: 0 },
  cats: DEFAULT_CATS,
  txns: [],
  rules: [
    { id: uid(), name: "ファミマのコーヒー", assumed: 250, actual: 50, icon: "coffee" },
    { id: uid(), name: "コンビニ弁当→自炊", assumed: 600, actual: 250, icon: "utensils" },
    { id: uid(), name: "自販機→水筒", assumed: 160, actual: 0, icon: "coffee" },
  ],
  saves: [],       // つもり貯金ログ {id,name,assumed,actual,saved,date,createdAt}
  rewards: [
    { id: uid(), name: "喫茶店へ行く権利", price: 1000, icon: "coffee" },
    { id: uid(), name: "好きな本を1冊", price: 1500, icon: "book" },
  ],
  redeems: [],     // 交換履歴 {id,rewardId,name,price,date,createdAt}
  shopping: [],    // 買い物リスト {id,name,price,category,icon,status:"open"|"bought"|"skipped",createdAt,doneDate}
});

const migrate = (d) => {
  if (!d || typeof d !== "object") return seed();
  const base = seed();
  return {
    ...base, ...d, v: SCHEMA,
    settings: { ...base.settings, ...(d.settings || {}) },
    cats: Array.isArray(d.cats) && d.cats.length ? d.cats : base.cats,
    txns: Array.isArray(d.txns) ? d.txns : [],
    rules: Array.isArray(d.rules) ? d.rules : [],
    saves: Array.isArray(d.saves) ? d.saves : [],
    rewards: Array.isArray(d.rewards) ? d.rewards : [],
    redeems: Array.isArray(d.redeems) ? d.redeems : [],
    shopping: Array.isArray(d.shopping) ? d.shopping : [],
  };
};
const load = () => { try { const r = localStorage.getItem(SAVE_KEY); return r ? migrate(JSON.parse(r)) : seed(); } catch (e) { return seed(); } };
let saveWarned = false;
const save = (obj) => {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(obj)); }
  catch (e) {
    if (!saveWarned) {
      saveWarned = true;
      alert("保存できませんでした。ブラウザの空き容量が不足しているか、プライベートモードの可能性があります。念のため 設定 →「書き出し」でバックアップを取ってください。");
    }
  }
};

// =================================================================
function App() {
  const [data, setData] = useState(load);
  const [tab, setTab] = useState("home");
  const [modal, setModal] = useState(null); // {type, ...}
  useEffect(() => { save(data); }, [data]);

  const T = resolveSkin(data.settings.theme);
  useEffect(() => { document.querySelector('meta[name=theme-color]')?.setAttribute("content", T.bg); document.body.style.background = T.bg; document.body.style.fontFamily = T.font; }, [data.settings.theme]);
  const s = styles(T);
  const cycleSkin = (dir = 1) => { const keys = Object.keys(SKINS); const i = keys.indexOf(data.settings.theme); const next = keys[(i + dir + keys.length) % keys.length]; setData((d) => ({ ...d, settings: { ...d.settings, theme: next } })); buzz(6); };

  // ---- 派生値 ----
  const balance = useMemo(() =>
    data.saves.reduce((a, x) => a + x.saved, 0) - data.redeems.reduce((a, x) => a + x.price, 0),
    [data.saves, data.redeems]);
  // 所持金: スタート金額 + 収入 − 支出 − リストの取り置き分
  // リストに予算付きで追加した瞬間に「取り置き」として差し引かれ、
  // 我慢すると戻ってきて(＋つもり貯金)、買うと支出として確定する
  const held = useMemo(() =>
    data.shopping.filter((x) => x.status === "open").reduce((a, x) => a + (x.price || 0), 0),
    [data.shopping]);
  const cash = useMemo(() =>
    (data.settings.startCash || 0)
    + data.txns.reduce((a, t) => a + (t.type === "income" ? t.amount : -t.amount), 0)
    - held,
    [data.txns, data.settings.startCash, held]);
  const catOf = (id) => data.cats.find((c) => c.id === id);
  const update = (fn) => setData((d) => fn({ ...d }));

  // ---- 操作 ----
  const addTxn = (t) => update((d) => ({ ...d, txns: [{ id: uid(), createdAt: Date.now(), satisfaction: 0, ...t }, ...d.txns] }));
  const editTxn = (id, patch) => update((d) => ({ ...d, txns: d.txns.map((t) => t.id === id ? { ...t, ...patch } : t) }));
  const setSatisfaction = (id, v) => update((d) => ({ ...d, txns: d.txns.map((t) => t.id === id ? { ...t, satisfaction: t.satisfaction === v ? 0 : v } : t) }));
  const setSat2 = (id, v) => { update((d) => ({ ...d, txns: d.txns.map((t) => t.id === id ? { ...t, sat2: v, sat2At: Date.now() } : t) })); buzz(8); };
  const skipSat2 = (id) => update((d) => ({ ...d, txns: d.txns.map((t) => t.id === id ? { ...t, sat2Skip: true } : t) }));
  const delTxn = (id) => update((d) => ({ ...d, txns: d.txns.filter((t) => t.id !== id) }));

  // ---- カテゴリ ----
  // 削除は archived フラグのソフト削除。過去の記録の名前・アイコン表示はそのまま維持される
  const addCat = (c) => { const id = uid(); update((d) => ({ ...d, cats: [...d.cats, { id, name: "", icon: "receipt", ...c }] })); return id; };
  const editCat = (id, patch) => update((d) => ({ ...d, cats: d.cats.map((c) => (c.id === id ? { ...c, ...patch } : c)) }));
  const delCat = (id) => update((d) => ({ ...d, cats: d.cats.map((c) => (c.id === id ? { ...c, archived: true } : c)) }));
  const restoreCat = (id) => update((d) => ({ ...d, cats: d.cats.map((c) => (c.id === id ? { ...c, archived: false } : c)) }));

  const logSave = (rule, actualOverride) => {
    const actual = actualOverride != null ? actualOverride : rule.actual;
    const saved = Math.max(0, rule.assumed - actual);
    update((d) => ({ ...d, saves: [{ id: uid(), createdAt: Date.now(), name: rule.name, assumed: rule.assumed, actual, saved, date: todayISO() }, ...d.saves] }));
    buzz();
  };
  const delSave = (id) => update((d) => ({ ...d, saves: d.saves.filter((x) => x.id !== id) }));
  const addRule = (r) => update((d) => ({ ...d, rules: [...d.rules, { id: uid(), ...r }] }));
  const editRule = (id, r) => update((d) => ({ ...d, rules: d.rules.map((x) => x.id === id ? { ...x, ...r } : x) }));
  const delRule = (id) => update((d) => ({ ...d, rules: d.rules.filter((x) => x.id !== id) }));

  const addReward = (r) => update((d) => ({ ...d, rewards: [...d.rewards, { id: uid(), ...r }] }));
  const editReward = (id, r) => update((d) => ({ ...d, rewards: d.rewards.map((x) => x.id === id ? { ...x, ...r } : x) }));
  const delReward = (id) => update((d) => ({ ...d, rewards: d.rewards.filter((x) => x.id !== id) }));
  const redeem = (rw) => { update((d) => ({ ...d, redeems: [{ id: uid(), createdAt: Date.now(), rewardId: rw.id, name: rw.name, price: rw.price, date: todayISO() }, ...d.redeems] })); buzz([10, 40, 20, 40, 80]); };
  const delRedeem = (id) => update((d) => ({ ...d, redeems: d.redeems.filter((x) => x.id !== id) }));

  // ---- 買い物リスト ----
  const addShopItem = (it) => update((d) => ({ ...d, shopping: [{ id: uid(), createdAt: Date.now(), status: "open", ...it }, ...d.shopping] }));
  const editShopItem = (id, patch) => update((d) => ({ ...d, shopping: d.shopping.map((x) => x.id === id ? { ...x, ...patch } : x) }));
  const delShopItem = (id) => update((d) => ({ ...d, shopping: d.shopping.filter((x) => x.id !== id) }));
  const markBought = (id) => update((d) => ({ ...d, shopping: d.shopping.map((x) => x.id === id ? { ...x, status: "bought", doneDate: todayISO() } : x) }));
  const keepShopItem = (id) => update((d) => ({ ...d, shopping: d.shopping.map((x) => x.id === id ? { ...x, keptAt: Date.now() } : x) }));
  const skipShopItem = (it) => {
    logSave({ name: it.name, assumed: it.price, actual: 0, icon: it.icon || "cart" });
    update((d) => ({ ...d, shopping: d.shopping.map((x) => x.id === it.id ? { ...x, status: "skipped", doneDate: todayISO() } : x) }));
  };

  const shared = { data, setData, update, T, s, balance, cash, held, catOf, modal, setModal, cycleSkin,
    addTxn, editTxn, setSatisfaction, setSat2, skipSat2, delTxn, logSave, delSave, addRule, editRule, delRule, addReward, editReward, delReward, redeem, delRedeem,
    addShopItem, editShopItem, delShopItem, markBought, skipShopItem, keepShopItem,
    addCat, editCat, delCat, restoreCat };

  return (
    <div style={s.app}>
      <div style={s.scroll}>
        {tab === "home" && <HomeScreen {...shared} go={setTab} />}
        {tab === "ledger" && <LedgerScreen {...shared} />}
        {tab === "analysis" && <AnalysisScreen {...shared} />}
        {tab === "list" && <ShoppingScreen {...shared} />}
        {tab === "tsumori" && <TsumoriScreen {...shared} />}
        {tab === "shop" && <ShopScreen {...shared} />}
      </div>

      {/* 追加ボタン（ホームはフォーム自体があるので非表示） */}
      {tab !== "home" && (
        <button style={s.fab} onClick={() => setModal({ type: tab === "tsumori" ? "save" : tab === "shop" ? "reward" : tab === "list" ? "shopItem" : "txn" })} aria-label="追加">
          <Plus size={26} color={T.onGold} strokeWidth={2.6} />
        </button>
      )}

      {/* ボトムナビ */}
      <nav style={s.nav}>
        <NavBtn s={s} T={T} active={tab === "home"} onClick={() => setTab("home")} icon={Home} label="ホーム" />
        <NavBtn s={s} T={T} active={tab === "ledger"} onClick={() => setTab("ledger")} icon={Wallet} label="家計簿" />
        <NavBtn s={s} T={T} active={tab === "analysis"} onClick={() => setTab("analysis")} icon={BarChart3} label="分析" />
        <NavBtn s={s} T={T} active={tab === "list"} onClick={() => setTab("list")} icon={ListChecks} label="リスト" />

function QuickEntry({ data, T, s, addTxn, addCat, editCat, delCat, restoreCat }) {
  const [type, setType] = useState("expense");
  const [amount, setAmount] = useState("");
  const [category, setCategory] = useState((data.cats.find((c) => !c.archived) || data.cats[0]).id);
  const [memo, setMemo] = useState("");
  const [date, setDate] = useState(todayISO());
  const [catOpen, setCatOpen] = useState(false);
  const [memoFocus, setMemoFocus] = useState(false);
  const [showCatMgr, setShowCatMgr] = useState(false);
  const [flash, setFlash] = useState(false);
  const flashTimer = React.useRef(null);
  useEffect(() => () => clearTimeout(flashTimer.current), []);

  const activeCats = data.cats.filter((c) => !c.archived);
  const cat = data.cats.find((c) => c.id === category);
  const wheelCats = cat && cat.archived ? [...activeCats, cat] : activeCats;
  useEffect(() => {
    if (!wheelCats.some((c) => c.id === category) && activeCats[0]) setCategory(activeCats[0].id);
  }, [data.cats]);

  const row = { display: "flex", alignItems: "center", gap: 10, padding: "13px 2px", borderBottom: `1px solid ${T.line}` };
  const rowLabel = { color: T.hi, fontSize: 15, fontWeight: 600, flexShrink: 0 };

  const submit = () => {
    const amt = parseInt(amount, 10);
    if (!amt) return;
    addTxn({ type, amount: amt, category, memo: memo.trim(), date });
    setAmount(""); setMemo(""); setDate(todayISO()); setCatOpen(false); setMemoFocus(false);
    buzz(10);
    setFlash(true);
    clearTimeout(flashTimer.current);
    flashTimer.current = setTimeout(() => setFlash(false), 1800);
  };

  return (
    <>
      <div style={{ ...s.segRow, marginBottom: 4 }}>
        <button style={{ ...s.seg, ...(type === "expense" ? s.segOn(T, T.neg) : {}) }} onClick={() => setType("expense")}>支出</button>
        <button style={{ ...s.seg, ...(type === "income" ? s.segOn(T, T.pos) : {}) }} onClick={() => setType("income")}>収入</button>
      </div>

      {/* 金額 */}
      <div style={row}>
        <span style={rowLabel}>金額</span>
        <span style={{ color: T.lo, fontSize: 15, fontWeight: 700, marginLeft: "auto" }}>¥</span>
        <input style={{ ...rowInput, flex: "none", width: 120 }} inputMode="numeric" pattern="[0-9]*" value={amount} placeholder="0"
          onChange={(e) => setAmount(e.target.value.replace(/[^0-9]/g, ""))} />
      </div>

      {/* カテゴリ（押すとホイールが開く） */}
      {type === "expense" && (
        <>
          <button style={{ ...row, width: "100%", background: "none", border: "none", borderBottom: `1px solid ${T.line}`, cursor: "pointer", fontFamily: T.font }} onClick={() => setCatOpen((v) => !v)}>
            <span style={rowLabel}>カテゴリー</span>
            <span style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6, color: T.hi, fontSize: 16, fontWeight: 600 }}>
              <Ic name={cat?.icon} size={16} color={T.gold} />{cat?.name || "選択"}
            </span>
            <ChevronRight size={16} color={T.lo} style={{ transform: catOpen ? "rotate(90deg)" : "none", transition: "transform .15s" }} />
          </button>
          {catOpen && (
            <div style={{ padding: "10px 0", borderBottom: `1px solid ${T.line}` }}>
              <WheelPicker s={s} T={T} items={wheelCats} value={category} onChange={setCategory} />
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
                <button style={s.catChip} onClick={() => setShowCatMgr(true)}><Pencil size={13} color={T.lo} /> 追加/編集</button>
                <button style={{ ...s.catChip, borderColor: T.gold, color: T.hi }} onClick={() => setCatOpen(false)}><Check size={13} color={T.gold} /> 完了</button>

        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", padding: "10px 0", borderBottom: `1px solid ${T.line}` }}>

function MonthCalendar({ s, T, mk, onPrev, onNext, dayExp, dayInc, onDay }) {
  const [y, m] = mk.split("-").map(Number);
  const firstDow = new Date(y, m - 1, 1).getDay();
  const days = new Date(y, m, 0).getDate();
  const prevDays = new Date(y, m - 1, 0).getDate();
  const todayStr = todayISO();
  const dow = ["日", "月", "火", "水", "木", "金", "土"];
  const INC = "#3B82F6"; // 収入の青（参考画像に合わせて）
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push({ d: prevDays - firstDow + 1 + i, out: true });
  for (let d = 1; d <= days; d++) cells.push({ d, out: false });
  let nx = 1;
  while (cells.length % 7 !== 0) cells.push({ d: nx++, out: true });
  return (
    <div style={s.calCard}>
      <div style={s.calHead}>
        <button style={s.calNav} onClick={onPrev} aria-label="前の月"><ChevronLeft size={20} color={T.hi} /></button>
        <div style={s.calTitle}>{fmtMonth(mk)}</div>
        <button style={s.calNav} onClick={onNext} aria-label="次の月"><ChevronRight size={20} color={T.hi} /></button>
      </div>
      <div style={s.calGrid}>
        {dow.map((w, i) => <div key={w} style={{ ...s.calDow, color: i === 0 ? T.neg : i === 6 ? INC : T.lo }}>{w}</div>)}
        {cells.map((c, i) => {
          const col = i % 7;
          if (c.out) return <div key={"o" + i} style={s.calCellOut}><span style={{ ...s.calDay, color: T.lo, opacity: 0.35 }}>{c.d}</span></div>;
          const ds = `${mk}-${String(c.d).padStart(2, "0")}`;
          const isToday = ds === todayStr;
          const inc = dayInc[c.d] || 0;
          const exp = dayExp[c.d] || 0;
          return (
            <button key={c.d} style={s.calCell} onClick={() => onDay(ds)}>
              <span style={isToday ? { ...s.calDay, ...s.calToday(T) } : { ...s.calDay, color: col === 0 ? T.neg : col === 6 ? INC : T.hi }}>{c.d}</span>
              <div style={s.calAmts}>
                {inc > 0 && <span style={{ ...s.calAmt, color: INC }}>{yenCell(inc)}</span>}
                {exp > 0 && <span style={{ ...s.calAmt, color: T.neg }}>{yenCell(exp)}</span>}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function LedgerScreen({ data, T, s, catOf, setSatisfaction, setModal }) {
  const [mk, setMk] = useState(monthKey(todayISO()));

  const mTxns = data.txns.filter((t) => monthKey(t.date) === mk).sort((a, b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);
  const expense = mTxns.filter((t) => t.type !== "income").reduce((a, t) => a + t.amount, 0);
  const income = mTxns.filter((t) => t.type === "income").reduce((a, t) => a + t.amount, 0);

  // カレンダー用：日ごとの支出/収入合計
  const dayExp = {}, dayInc = {};
  mTxns.forEach((t) => { const d = +t.date.split("-")[2]; if (t.type === "income") dayInc[d] = (dayInc[d] || 0) + t.amount; else dayExp[d] = (dayExp[d] || 0) + t.amount; });

  // 日付ごとにグループ化
  const groups = useMemo(() => {
    const g = {};
    mTxns.forEach((t) => { (g[t.date] = g[t.date] || []).push(t); });
    return Object.entries(g);
  }, [mTxns]);

  // カテゴリ内訳

    mTxns.filter((t) => t.type !== "income").forEach((t) => { m[t.category] = (m[t.category] || 0) + t.amount; });

  return (

      </div>

      {byCat.length > 0 && (
        <>
          <SectionTitle s={s} T={T}>カテゴリ内訳</SectionTitle>

                  </div>
                  <div style={s.progTrack}><div style={{ ...s.progFill, width: `${pct * 100}%` }} /></div>
                </div>
              );
            })}
          </div>
        </>
      )}

      <SectionTitle s={s} T={T}>記録（★で満足度）</SectionTitle>
      {groups.length === 0 ? <div style={s.card}><div style={s.empty}>この月の記録はありません。</div></div> :

function AnalysisScreen({ data, T, s, catOf, setSat2, skipSat2 }) {
  const [mk, setMk] = useState(monthKey(todayISO()));
  const [seg, setSeg] = useState("overview"); // overview / category / regret
  const exp = data.txns.filter((t) => t.type !== "income" && monthKey(t.date) === mk);
  const rated = exp.filter((t) => t.satisfaction > 0);
  const cover = exp.length ? Math.round((rated.length / exp.length) * 100) : 0;
  const avgSat = rated.length ? (rated.reduce((a, t) => a + t.satisfaction, 0) / rated.length) : 0;
  // 1週間後の振り返り（月に関係なく全記録から）
  const resatList = data.txns
    .filter((t) => t.type !== "income" && t.satisfaction > 0 && !t.sat2 && !t.sat2Skip && daysAgo(t.date) >= RESAT_MIN && daysAgo(t.date) <= RESAT_MAX)
    .sort((a, b) => a.date.localeCompare(b.date));

  // カテゴリ別: 平均★・1★あたりの支払額
  const byCat = {};
  rated.forEach((t) => { const k = t.category || "other"; const v = (byCat[k] = byCat[k] || { n: 0, amt: 0, star: 0 }); v.n++; v.amt += t.amount; v.star += t.satisfaction; });
  const catRows = Object.entries(byCat).map(([id, v]) => ({ id, ...v, avg: v.star / v.n, unit: Math.round(v.amt / v.star) })).sort((a, b) => b.avg - a.avg);

  // 後悔した支出（★1-2）
  const regrets = rated.filter((t) => t.satisfaction <= 2).sort((a, b) => b.amount - a.amount);
  const regretTotal = regrets.reduce((a, t) => a + t.amount, 0);

  // 再評価で満足度が落ちた買い物
  const rerated = exp.filter((t) => t.sat2 && t.satisfaction > 0);
  const gaps = rerated.filter((t) => t.sat2 < t.satisfaction).sort((a, b) => (b.satisfaction - b.sat2) - (a.satisfaction - a.sat2));

  // 感情タグ別
  const emo = EMOTAGS.map((tag) => {
    const list = exp.filter((t) => (t.memo || "").includes("#" + tag));
    const r = list.filter((t) => t.satisfaction > 0);
    return { tag, n: list.length, amt: list.reduce((a, t) => a + t.amount, 0), avg: r.length ? r.reduce((a, t) => a + t.satisfaction, 0) / r.length : 0 };
  }).filter((e) => e.n > 0);

  const nameOf = (t) => t.memo || catOf(t.category)?.name || "支出";

  return (
    <div style={s.page}>
      <header style={s.appHead}><div style={s.appTitle}>分析</div></header>

      {/* 1週間後の振り返り（旧ホームから移設） */}
      <ResatCard s={s} T={T} list={resatList} catOf={catOf} setSat2={setSat2} skipSat2={skipSat2} />

      <div style={{ ...s.calHead, padding: "0 4px 12px" }}>
        <button style={s.calNav} onClick={() => setMk((k) => shiftMonth(k, -1))} aria-label="前の月"><ChevronLeft size={20} color={T.hi} /></button>
        <div style={s.calTitle}>{fmtMonth(mk)}</div>
        <button style={s.calNav} onClick={() => setMk((k) => shiftMonth(k, 1))} aria-label="次の月"><ChevronRight size={20} color={T.hi} /></button>
      </div>

      {exp.length === 0 ? (
        <div style={s.card}><div style={s.empty}>この月の支出はまだありません。</div></div>
      ) : (
        <>
          {/* セグメント切り替え：情報を3グループに分けて一度に見る量を減らす */}
          <div style={{ ...s.segRow, marginBottom: 14 }}>
            <button style={{ ...s.seg, ...(seg === "overview" ? s.segOn(T, T.gold) : {}) }} onClick={() => setSeg("overview")}>概要</button>
            <button style={{ ...s.seg, ...(seg === "category" ? s.segOn(T, T.gold) : {}) }} onClick={() => setSeg("category")}>カテゴリ</button>
            <button style={{ ...s.seg, ...(seg === "regret" ? s.segOn(T, T.gold) : {}) }} onClick={() => setSeg("regret")}>振り返り</button>
          </div>

          {seg === "overview" && (
            <>
              {/* 今月のふりかえり（旧ホームから移設） */}
              {rated.length > 0 && (
                <div style={{ ...s.card, marginBottom: 14 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span style={{ color: T.lo, fontSize: 13 }}>満足度の平均（{rated.length}件）</span>
                    <Stars value={Math.round(avgSat)} T={T} size={18} />
                  </div>
                  <div style={{ height: 1, background: T.line, margin: "12px 0" }} />
                  {(() => {
                    const best = [...rated].sort((a, b) => b.satisfaction - a.satisfaction)[0];
                    const worst = [...rated].sort((a, b) => a.satisfaction - b.satisfaction)[0];
                    return (
                      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                        <ReflectRow s={s} T={T} tag="満足度◎" tagColor={T.pos} txn={best} catOf={catOf} />
                        {worst.id !== best.id && <ReflectRow s={s} T={T} tag="見直したい" tagColor={T.neg} txn={worst} catOf={catOf} />}
                      </div>
                    );
                  })()}
                </div>
              )}

              {/* ★記入率 */}
              <div style={{ ...s.card, padding: 14 }}>
                <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 8 }}>
                  <span style={{ color: T.lo, fontSize: 12, fontWeight: 700 }}>★の記入率</span>
                  <span style={{ color: T.hi, fontSize: 13, fontWeight: 800 }}>{exp.length}件中 {rated.length}件（{cover}%）</span>
                </div>
                <div style={s.progTrack}><div style={{ ...s.progFill, width: `${cover}%` }} /></div>
                {cover < 100 && <div style={{ color: T.lo, fontSize: 11, marginTop: 8, lineHeight: 1.6 }}>★を付けるほど分析が正確になります。家計簿タブの記録をタップして付けられます。</div>}
              </div>
            </>
          )}

          {seg === "category" && (
            <>
              {/* カテゴリ別 */}
              <SectionTitle s={s} T={T}>カテゴリ別の満足度</SectionTitle>
              <div style={s.card}>
                {catRows.length === 0 && <div style={s.empty}>★を付けた支出がまだありません。</div>}
                {catRows.map((r) => { const c = catOf(r.id); return (
                  <div key={r.id} style={s.txnRow}>
                    <div style={{ ...s.txnIcon, background: T.gold + "1E" }}><Ic name={c?.icon || "receipt"} size={16} color={T.gold} /></div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ color: T.hi, fontSize: 14, fontWeight: 600 }}>{c?.name || "その他"}</div>
                      <div style={{ color: T.lo, fontSize: 11 }}>{r.n}件 · 1★あたり {yen(r.unit)}</div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                      <Star size={14} color={T.gold} fill={T.gold} />
                      <span style={{ color: T.hi, fontSize: 15, fontWeight: 800 }}>{r.avg.toFixed(1)}</span>
                    </div>
                  </div>
                ); })}
              </div>

              {/* 感情タグ別 */}
              <SectionTitle s={s} T={T}>気分と満足度</SectionTitle>
              <div style={s.card}>
                {emo.length === 0 ? (
                  <div style={s.empty}>記録のメモに #衝動 #ストレス #ご褒美 #必要 を付けると、{"\n"}気分ごとの満足度がここに出ます（記録フォームにチップがあります）。</div>
                ) : (
                  emo.map((e) => (
                    <div key={e.tag} style={s.txnRow}>
                      <span style={{ ...s.pill, background: T.gold + "22", color: T.gold }}>#{e.tag}</span>
                      <div style={{ flex: 1 }}><div style={{ color: T.lo, fontSize: 11 }}>{e.n}件 · {yen(e.amt)}</div></div>
                      <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                        <Star size={14} color={T.gold} fill={T.gold} />
                        <span style={{ color: T.hi, fontSize: 15, fontWeight: 800 }}>{e.avg ? e.avg.toFixed(1) : "—"}</span>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </>
          )}

          {seg === "regret" && (
            <>
              {/* 後悔した支出 */}
              <SectionTitle s={s} T={T}>後悔した支出（★1-2）</SectionTitle>
              <div style={{ ...s.card, padding: regrets.length ? undefined : 0 }}>
                {regrets.length === 0 ? (
                  <div style={{ padding: 14 }}><div style={s.empty}>この月は後悔した買い物なし。良いお金の使い方です！</div></div>
                ) : (
                  <>
                    <div style={{ padding: "14px 14px 4px" }}>
                      <div style={{ color: T.neg, fontSize: 22, fontWeight: 800 }}>{yen(regretTotal)}</div>
                      <div style={{ color: T.lo, fontSize: 11, lineHeight: 1.6 }}>この額が来月のつもり貯金の伸びしろ。同じ買い物を我慢できたら、そのままご褒美の原資になります。</div>
                    </div>
                    {regrets.slice(0, 5).map((t) => (
                      <div key={t.id} style={s.txnRow}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ color: T.hi, fontSize: 13, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{nameOf(t)}</div>
                          <div style={{ color: T.lo, fontSize: 11 }}>{fmtDate(t.date)}</div>
                        </div>
                        <Stars value={t.satisfaction} T={T} size={12} />
                        <span style={{ color: T.neg, fontSize: 13, fontWeight: 700 }}>{yen(t.amount)}</span>
                      </div>
                    ))}
                  </>
                )}
              </div>

              {/* 満足度が落ちた買い物 */}
              <SectionTitle s={s} T={T}>時間が経って満足度が落ちた買い物</SectionTitle>
              <div style={s.card}>
                {rerated.length === 0 ? (
                  <div style={s.empty}>★を付けて7日経つと、このタブの上に「振り返り」が出ます。{"\n"}付け直した★との差がここに表示されます。</div>
                ) : gaps.length === 0 ? (
                  <div style={s.empty}>再評価{rerated.length}件、満足度は落ちていません。{"\n"}衝動買いの少ない良い選択ができています。</div>
                ) : (
                  gaps.slice(0, 5).map((t) => (
                    <div key={t.id} style={s.txnRow}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ color: T.hi, fontSize: 13, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{nameOf(t)}</div>
                        <div style={{ color: T.lo, fontSize: 11 }}>{fmtDate(t.date)} · {yen(t.amount)}</div>
                      </div>
                      <span style={{ color: T.hi, fontSize: 13, fontWeight: 800 }}>★{t.satisfaction} <span style={{ color: T.lo }}>→</span> <span style={{ color: T.neg }}>★{t.sat2}</span></span>
                    </div>
                  ))
                )}
              </div>
            </>
          )}
        </>
      )}
      <div style={{ height: 24 }} />
    </div>
  );
}

// ============================ つもり貯金 ============================
function TsumoriScreen({ data, T, s, balance, logSave, delSave, setModal }) {
  const recent = data.saves.slice(0, 30);
  const total = data.saves.reduce((a, x) => a + x.saved, 0);
  // 次のご褒美（残高で買えそうな一番近いもの）
  const nextReward = [...data.rewards].sort((a, b) => a.price - b.price).find((r) => r.price > balance) || [...data.rewards].sort((a, b) => b.price - a.price)[0];
  const prog = nextReward ? Math.min(1, balance / nextReward.price) : 0;

  return (
    <div style={s.page}>
      <header style={s.appHead}><div style={s.appTitle}>つもり貯金</div></header>

      <div style={s.hero}>
        <div style={s.heroGlow} />
        <div style={s.heroRow}><PiggyBank size={24} color={T.gold} strokeWidth={2} /><span style={s.heroLabel}>使える残高</span></div>
        <div style={s.heroAmt}>{yen(balance)}</div>
        <div style={{ color: T.lo, fontSize: 12, marginTop: 6 }}>これまで貯めた合計 {yen(total)}</div>
        {nextReward && (
          <div style={{ marginTop: 14 }}>
            <div style={s.progLabelRow}>
              <span style={{ color: T.lo, fontSize: 12 }}>次のご褒美「{nextReward.name}」まで</span>
              <span style={{ color: T.hi, fontSize: 12, fontWeight: 700 }}>{prog >= 1 ? "達成！" : yen(Math.max(0, nextReward.price - balance))}</span>
            </div>
            <div style={s.progTrack}><div style={{ ...s.progFill, width: `${prog * 100}%` }} /></div>
          </div>
        )}
      </div>

      <SectionTitle s={s} T={T}>つもりルール（タップで記録）</SectionTitle>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {data.rules.map((r) => (
          <button key={r.id} style={s.ruleCard} onClick={() => logSave(r)}>
            <div style={{ ...s.txnIcon, background: T.gold + "1E" }}><Ic name={r.icon} size={18} color={T.gold} /></div>
            <div style={{ flex: 1, minWidth: 0, textAlign: "left" }}>
              <div style={{ color: T.hi, fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.name}</div>
              <div style={{ color: T.lo, fontSize: 12 }}>{yen(r.assumed)} → {yen(r.actual)}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ color: T.gold, fontSize: 16, fontWeight: 800 }}>+{yen(Math.max(0, r.assumed - r.actual))}</div>
              <div style={{ color: T.lo, fontSize: 11 }}>貯金する</div>
            </div>
          </button>
        ))}
        <button style={s.dashedBtn} onClick={() => setModal({ type: "rule" })}><Plus size={16} color={T.lo} /> つもりルールを追加</button>
      </div>

      <SectionTitle s={s} T={T}>貯金の記録</SectionTitle>
      <div style={s.card}>
        {recent.length === 0 ? <div style={s.empty}>上のルールをタップすると、{"\n"}差額がここに貯まっていきます。</div> :
          recent.map((x) => (
            <div key={x.id} style={s.txnRow}>
              <div style={{ ...s.txnIcon, background: T.gold + "1E" }}><PiggyBank size={16} color={T.gold} /></div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ color: T.hi, fontSize: 14, fontWeight: 600 }}>{x.name}</div>
                <div style={{ color: T.lo, fontSize: 11 }}>{fmtDate(x.date)} · {yen(x.assumed)}→{yen(x.actual)}</div>
              </div>
              <div style={{ color: T.gold, fontSize: 15, fontWeight: 700 }}>+{yen(x.saved)}</div>
              <button style={s.delMini} onClick={() => delSave(x.id)} aria-label="削除"><X size={14} color={T.lo} /></button>
            </div>
          ))}
      </div>
      <div style={{ height: 24 }} />
    </div>
  );
}

    <div style={s.page}>
      <header style={s.appHead}><div style={s.appTitle}>ご褒美ショップ</div></header>

      <div style={s.shopBalance}>
        <Coins size={18} color={T.gold} />
        <span style={{ color: T.lo, fontSize: 13 }}>使えるつもり貯金</span>

                {ok ? <><Gift size={15} /> 交換する</> : `あと ${yen(r.price - balance)}`}

      {data.redeems.length > 0 && (
        <>
          <SectionTitle s={s} T={T}>交換した履歴</SectionTitle>

                <div style={{ flex: 1, minWidth: 0 }}><div style={{ color: T.hi, fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{x.name}</div><div style={{ color: T.lo, fontSize: 11 }}>{fmtDate(x.date)}</div></div>
                <div style={{ color: T.lo, fontSize: 14, fontWeight: 700 }}>-{yen(x.price)}</div>
                <button style={s.delMini} onClick={() => delRedeem(x.id)} aria-label="交換を取り消す"><X size={14} color={T.lo} /></button>

          <div style={s.confirmBox} onClick={(e) => e.stopPropagation()}>

            <div style={{ color: T.hi, fontSize: 17, fontWeight: 700, textAlign: "center" }}>「{confirm.name}」と交換しますか？</div>
            <div style={{ color: T.lo, fontSize: 13, textAlign: "center", margin: "8px 0 18px" }}>{yen(confirm.price)} を使います</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button style={s.btnGhost} onClick={() => setConfirm(null)}>やめる</button>
              <button style={s.btnGold} onClick={() => { redeem(confirm); setConfirm(null); }}>交換する</button>
            </div>
          </div>
        </div>

  );
}

// ============================ 買い物リスト ============================
function ShoppingScreen({ data, T, s, cash, held, catOf, setModal, skipShopItem, delShopItem, keepShopItem }) {
  const open = data.shopping.filter((x) => x.status === "open");
  const done = data.shopping.filter((x) => x.status !== "open").slice(0, 30);
  const coolMs = (data.settings.coolDays ?? 7) * 86400000;

  return (
    <div style={s.page}>
      <header style={s.appHead}><div style={s.appTitle}>買い物リスト</div></header>

      {/* 所持金と取り置き */}
      <div style={{ ...s.shopBalance, flexDirection: "column", alignItems: "stretch", gap: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Wallet size={18} color={cash >= 0 ? T.gold : T.neg} />
          <span style={{ color: T.lo, fontSize: 13 }}>所持金</span>
          <span style={{ color: cash >= 0 ? T.hi : T.neg, fontSize: 20, fontWeight: 800, marginLeft: "auto" }}>{yen(cash)}</span>
        </div>
        <div style={{ height: 1, background: T.line }} />
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <ListChecks size={16} color={T.gold} />
          <span style={{ color: T.lo, fontSize: 12 }}>買う予定 {open.length}件で取り置き中</span>
          <span style={{ color: T.gold, fontSize: 14, fontWeight: 800, marginLeft: "auto" }}>−{yen(held)}</span>
        </div>
        <div style={{ color: T.lo, fontSize: 10, lineHeight: 1.6 }}>予算付きでリストに入れると所持金から取り置きされます。我慢すると戻ってきて、同額がつもり貯金に。買うとそのまま支出になります。</div>
      </div>

      <SectionTitle s={s} T={T}>買う予定のもの</SectionTitle>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {open.length === 0 && <div style={s.card}><div style={s.empty}>リストは空です。{"\n"}＋から買いたいものを追加しましょう。{"\n"}買う前にリストに入れて一晩おくと、{"\n"}「本当に欲しいか」が見えてきます。</div></div>}
        {open.map((it) => {
          const c = catOf(it.category);
          const coolLeft = Math.ceil((it.createdAt + coolMs - Date.now()) / 86400000);
          const cooling = !it.keptAt && coolLeft > 0;
          const askKeep = !it.keptAt && coolLeft <= 0;
          const buy = () => {
            if (cooling && !window.confirm(`冷却期間中です（あと${coolLeft}日）。\nそれでも「${it.name}」を買いますか？`)) return;
            setModal({ type: "txn", prefill: { amount: it.price || 0, category: it.category, memo: it.name }, shoppingId: it.id });
          };
          return (
            <div key={it.id} style={{ ...s.card, padding: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 11, cursor: "pointer" }} onClick={() => setModal({ type: "shopItem", id: it.id })}>
                <div style={{ ...s.txnIcon, background: T.gold + "1E" }}><Ic name={it.icon || c?.icon || "cart"} size={17} color={T.gold} /></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ color: T.hi, fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{it.name}</div>
                  <div style={{ color: T.lo, fontSize: 11 }}>{c?.name || "カテゴリなし"}{it.price ? ` · 予算 ${yen(it.price)}` : " · 予算未設定"}</div>
                </div>
                {cooling && <span style={{ ...s.pill, background: T.gold + "22", color: T.gold, display: "inline-flex", alignItems: "center", gap: 4 }}><Clock size={11} /> あと{coolLeft}日</span>}
                <Pencil size={14} color={T.lo} />
              </div>
              {askKeep && (
                <div style={{ marginTop: 10, padding: "10px 11px", borderRadius: 10, background: T.gold + "14", border: `1px solid ${T.gold}44` }}>
                  <div style={{ color: T.hi, fontSize: 12, fontWeight: 700, marginBottom: 8 }}>冷却期間が明けました。まだ欲しいですか？</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button style={{ ...s.btnGhost, flex: 1, padding: "8px 0", fontSize: 12 }} onClick={() => keepShopItem(it.id)}>まだ欲しい</button>
                    <button style={{ ...s.btnGhost, flex: 1, padding: "8px 0", fontSize: 12, color: T.gold, borderColor: T.gold + "66" }}
                      onClick={() => { if (it.price) { skipShopItem(it); } else if (window.confirm(`「${it.name}」をリストから削除しますか？\n（予算未設定のため、つもり貯金にはなりません）`)) { delShopItem(it.id); } }}>
                      もういらない{it.price ? "→貯金" : ""}
                    </button>
                  </div>
                </div>
              )}
              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                <button style={{ ...s.btnGhost, flex: 1, padding: "10px 0", fontSize: 13, opacity: cooling ? 0.65 : 1 }} onClick={buy}>
                  <Receipt size={15} /> 買った
                </button>
                <button style={{ ...s.btnGhost, flex: 1, padding: "10px 0", fontSize: 13, color: T.gold, borderColor: T.gold + "66" }}
                  onClick={() => { if (it.price) { skipShopItem(it); } else { setModal({ type: "shopItem", id: it.id, needPrice: true }); } }}>
                  <PiggyBank size={15} /> 我慢して貯金
                </button>
              </div>
            </div>
          );
        })}
        <button style={s.dashedBtn} onClick={() => setModal({ type: "shopItem" })}><Plus size={16} color={T.lo} /> 買いたいものを追加</button>
      </div>

      {done.length > 0 && (
        <>
          <SectionTitle s={s} T={T}>済んだもの</SectionTitle>
          <div style={s.card}>
            {done.map((x) => (
              <div key={x.id} style={s.txnRow}>

// ドラムロール式ピッカー（iOSホイール風・スクロールスナップ）
function WheelPicker({ s, T, items, value, onChange }) {
  const ITEM_H = 40, VISIBLE = 5;
  const H = ITEM_H * VISIBLE;
  const pad = (H - ITEM_H) / 2;
  const ref = React.useRef(null);
  const timer = React.useRef(null);
  const idx = Math.max(0, items.findIndex((it) => it.id === value));

  // 初回・外部からの値変更・項目数変化のとき位置合わせ
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const target = idx * ITEM_H;
    if (Math.abs(el.scrollTop - target) > ITEM_H * 0.55) el.scrollTop = target; // 1項目以上ズレたときだけ補正(スナップと喧嘩しない)
  }, [value, items.length]);

  const onScroll = () => {
    const el = ref.current; if (!el) return;
    clearTimeout(timer.current);
    timer.current = setTimeout(() => {
      const i = Math.min(items.length - 1, Math.max(0, Math.round(el.scrollTop / ITEM_H)));
      if (items[i] && items[i].id !== value) { onChange(items[i].id); buzz(4); }
    }, 100);
  };

  return (
    <div style={{ position: "relative", height: H, borderRadius: T.R.btn, background: T.card2, border: `1px solid ${T.line}`, overflow: "hidden" }}>
      {/* 中央の選択バンド */}
      <div style={{ position: "absolute", top: pad, left: 8, right: 8, height: ITEM_H, borderRadius: Math.max(6, T.R.btn - 3), background: T.gold + "16", border: `1px solid ${T.gold}55`, pointerEvents: "none", zIndex: 1 }} />
      <div ref={ref} className="nosb" onScroll={onScroll}
        style={{ height: "100%", overflowY: "auto", scrollSnapType: "y mandatory", WebkitOverflowScrolling: "touch",
          WebkitMaskImage: "linear-gradient(transparent, #000 22%, #000 78%, transparent)", maskImage: "linear-gradient(transparent, #000 22%, #000 78%, transparent)" }}>
        <div style={{ height: pad }} />
        {items.map((it, i) => {
          const on = it.id === value;
          return (
            <div key={it.id} onClick={() => ref.current && ref.current.scrollTo({ top: i * ITEM_H, behavior: "smooth" })}
              style={{ height: ITEM_H, display: "flex", alignItems: "center", justifyContent: "center", gap: 7, scrollSnapAlign: "center", cursor: "pointer",
                color: on ? T.hi : T.lo, fontSize: on ? 16 : 14, fontWeight: on ? 700 : 500, transition: "color .15s" }}>
              <Ic name={it.icon} size={on ? 17 : 15} color={on ? T.gold : T.lo} />
              {it.name || "（名称未設定）"}{it.archived ? "（削除済み）" : ""}
            </div>
          );
        })}
        <div style={{ height: pad }} />
      </div>
    </div>
  );
}

// カテゴリの追加・編集・削除・復元モーダル
function CatManager({ s, T, data, addCat, editCat, delCat, restoreCat, close }) {

          <div key={c.id} style={{ marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <button style={{ width: 46, height: 46, flex: "none", display: "flex", alignItems: "center", justifyContent: "center", background: T.card2, border: `1px solid ${iconFor === c.id ? T.gold : T.line}`, borderRadius: T.R.icon, cursor: "pointer" }}
                onClick={() => setIconFor(iconFor === c.id ? null : c.id)} aria-label="アイコンを変更">
                <Ic name={c.icon} size={19} color={T.gold} />
              </button>
              <input style={{ ...s.input, flex: 1, width: "auto" }} value={c.name} placeholder="カテゴリ名" onChange={(e) => editCat(c.id, { name: e.target.value })} />
              <button style={s.iconBtn} aria-label="削除"
                onClick={() => {
                  if (active.length <= 1) { alert("カテゴリは最低1つ必要です"); return; }
                  if (confirm(`「${c.name || "（名称未設定）"}」を削除しますか？\n過去の記録はそのまま残ります。`)) { delCat(c.id); if (iconFor === c.id) setIconFor(null); }
                }}>
                <Trash2 size={17} color={T.neg} />
              </button>
            </div>
            {iconFor === c.id && (
              <div style={{ ...s.iconGrid, marginTop: 8, padding: 10, background: T.card2, borderRadius: T.R.card, border: `1px solid ${T.line}` }}>
                {ICON_KEYS.map((k) => (
                  <button key={k} style={{ ...s.iconCell, background: c.icon === k ? T.gold + "22" : T.modal, borderColor: c.icon === k ? T.gold : T.line }}
                    onClick={() => { editCat(c.id, { icon: k }); setIconFor(null); buzz(5); }}>
                    <Ic name={k} size={17} color={c.icon === k ? T.gold : T.lo} />
                  </button>
                ))}
              </div>
            )}
          </div>
        ))}
        <button style={{ ...s.dashedBtn, width: "100%", marginTop: 4 }} onClick={() => { const id = addCat({}); setIconFor(id); }}>
          <Plus size={15} color={T.lo} /> カテゴリを追加
        </button>
        {archived.length > 0 && (
          <>
            <div style={{ ...s.fieldLabel, marginTop: 20 }}>削除済み（過去の記録には残っています）</div>
            {archived.map((c) => (
              <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 9, padding: "7px 2px" }}>
                <Ic name={c.icon} size={16} color={T.lo} />
                <span style={{ flex: 1, color: T.lo, fontSize: 14 }}>{c.name || "（名称未設定）"}</span>
                <button style={s.catChip} onClick={() => restoreCat(c.id)}><RotateCcw size={13} color={T.lo} /> 復元</button>
              </div>
            ))}

        )}

      </div>
    </div>
  );
}

// 支出/収入フォーム
function TxnForm({ s, T, data, addTxn, editTxn, delTxn, setSatisfaction, close, editId, modal, markBought, addCat, editCat, delCat, restoreCat }) {
  const edit = editId ? data.txns.find((t) => t.id === editId) : null;
  const pre = !edit ? modal?.prefill : null;
  const [type, setType] = useState(edit?.type || "expense");
  const [amount, setAmount] = useState(edit ? String(edit.amount) : (pre?.amount ? String(pre.amount) : ""));
  const [category, setCategory] = useState(edit?.category || pre?.category || (data.cats.find((c) => !c.archived) || data.cats[0]).id);
  const [memo, setMemo] = useState(edit?.memo || pre?.memo || "");
  const [date, setDate] = useState(edit?.date || pre?.date || todayISO());
  const [showCatMgr, setShowCatMgr] = useState(false);

  // ホイールに出す項目: アクティブ + （編集中の記録が削除済みカテゴリの場合はそれも含める）
  const activeCats = data.cats.filter((c) => !c.archived);
  const curCat = data.cats.find((c) => c.id === category);
  const wheelCats = curCat && curCat.archived ? [...activeCats, curCat] : activeCats;

  // 選択中カテゴリが削除されたら先頭のアクティブへ寄せる
  useEffect(() => {
    if (!wheelCats.some((c) => c.id === category) && activeCats[0]) setCategory(activeCats[0].id);
  }, [data.cats]);

  const submit = () => {
    const amt = parseInt(amount, 10);
    if (!amt) return;
    if (edit) {
      editTxn(edit.id, { type, amount: amt, category, memo: memo.trim(), date });
    } else {
      addTxn({ type, amount: amt, category, memo: memo.trim(), date });
    }
    if (modal?.shoppingId) markBought(modal.shoppingId);
    close();
  };

  return (
    <>
      <SheetHead s={s} T={T} title={edit ? "記録を編集" : "記録する"} close={close} onDelete={edit ? () => { delTxn(edit.id); close(); } : null} />
      <div style={s.segRow}>
        <button style={{ ...s.seg, ...(type === "expense" ? s.segOn(T, T.neg) : {}) }} onClick={() => setType("expense")}>支出</button>
        <button style={{ ...s.seg, ...(type === "income" ? s.segOn(T, T.pos) : {}) }} onClick={() => setType("income")}>収入</button>
      </div>
      <Field s={s} T={T} label="金額">
        <div style={s.amtWrap}><span style={s.yenMark}>¥</span><input autoFocus style={s.amtInput} inputMode="numeric" pattern="[0-9]*" value={amount} placeholder="0" onChange={(e) => setAmount(e.target.value.replace(/[^0-9]/g, ""))} /></div>
      </Field>
      {type === "expense" && (
        <Field s={s} T={T} label="カテゴリ">
          <WheelPicker s={s} T={T} items={wheelCats} value={category} onChange={setCategory} />
          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8 }}>
            <button style={s.catChip} onClick={() => setShowCatMgr(true)}>
              <Pencil size={13} color={T.lo} /> 追加/編集
            </button>
          </div>
        </Field>
      )}
      {showCatMgr && <CatManager s={s} T={T} data={data} addCat={addCat} editCat={editCat} delCat={delCat} restoreCat={restoreCat} close={() => setShowCatMgr(false)} />}
      <Field s={s} T={T} label="メモ">
        {type === "expense" && (
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
            {EMOTAGS.map((tag) => {
              const on = memo.includes("#" + tag);
              return (
                <button key={tag} style={{ ...s.catChip, ...(on ? { background: T.gold + "20", borderColor: T.gold, color: T.hi } : {}) }}
                  onClick={() => setMemo((m) => on ? m.replace("#" + tag, "").replace(/\s{2,}/g, " ").trim() : (m ? m + " " : "") + "#" + tag)}>
                  #{tag}
                </button>
              );
            })}
          </div>
        )}
        <input style={s.input} value={memo} placeholder={type === "income" ? "給料 など" : "ファミマ など"} onChange={(e) => setMemo(e.target.value)} />
        {type === "expense" && <div style={{ color: T.lo, fontSize: 10, marginTop: 5 }}>気分タグは任意。付けると分析タブで「気分×満足度」が見えます。</div>}
      </Field>
      <Field s={s} T={T} label="日付"><input type="date" style={s.dateInput} value={date} onChange={(e) => setDate(e.target.value)} /></Field>
      {edit && type === "expense" && (
        <Field s={s} T={T} label="満足度（このお金の使い方は？）">
          <div style={{ padding: "4px 0" }}><Stars value={edit.satisfaction} T={T} size={30} onRate={(v) => setSatisfaction(edit.id, v)} /></div>
        </Field>
      )}
      <button style={{ ...s.btnGold, width: "100%", opacity: amount ? 1 : 0.5 }} onClick={submit}>{edit ? "保存する" : "記録する"}</button>
    </>
  );
}

      {needPrice && <div style={{ ...s.savedPreview, color: T.gold, marginBottom: 14 }}>我慢して貯金するには予算の入力が必要です</div>}
      <Field s={s} T={T} label="名前"><input autoFocus={!edit} style={s.input} value={name} placeholder="例：新しいイヤホン" onChange={(e) => setName(e.target.value)} /></Field>
      <Field s={s} T={T} label="予算（所持金から取り置き。我慢したら戻ってきて、つもり貯金に）"><NumInput s={s} value={price} onChange={setPrice} placeholder="3000" /></Field>
      <Field s={s} T={T} label="カテゴリ">
        <div style={s.catGrid}>
          {pickCats.map((c) => (
            <button key={c.id} style={{ ...s.catChip, ...(category === c.id ? { background: T.gold + "20", borderColor: T.gold, color: T.hi } : {}) }} onClick={() => setCategory(c.id)}>
              <Ic name={c.icon} size={15} color={category === c.id ? T.gold : T.lo} /> {c.name}
            </button>
          ))}
        </div>
      </Field>
      <Field s={s} T={T} label="アイコン"><IconPicker s={s} T={T} value={icon} onChange={setIcon} /></Field>
      <button style={{ ...s.btnGold, width: "100%", opacity: name.trim() ? 1 : 0.5 }} onClick={submit}>{edit ? "保存する" : "追加する"}</button>
    </>
  );
}

// 設定
function SettingsForm({ s, T, data, setData, close }) {
  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a");
    a.href = url; a.download = `tsumori-cash-${todayISO()}.json`; a.click(); URL.revokeObjectURL(url);
  };
  const importData = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader(); r.onload = () => { try { setData(migrate(JSON.parse(r.result))); close(); } catch (err) { alert("読み込みに失敗しました"); } }; r.readAsText(f);
  };
  return (
    <>
      <SheetHead s={s} T={T} title="設定" close={close} />
      <Field s={s} T={T} label={`デザイン（${Object.keys(SKINS).length}パターン）`}>
        <div style={s.skinGrid}>
          {Object.entries(SKINS).map(([k, sk]) => {
            const p = sk.pal, on = data.settings.theme === k;
            const swatchBg = p.card.startsWith("rgba") ? p.bg : p.card;
            return (
              <button key={k} onClick={() => { setData((d) => ({ ...d, settings: { ...d.settings, theme: k } })); buzz(6); }}
                style={{ padding: 0, background: p.bg, border: `2px solid ${on ? p.gold : T.line}`, borderRadius: 14, overflow: "hidden", cursor: "pointer", textAlign: "left" }}>
                <div style={{ padding: "12px 12px 10px" }}>
                  {/* ミニプレビュー：残高カードとボタンの見立て */}
                  <div style={{ background: swatchBg, border: `1px solid ${p.line}`, borderRadius: 8, padding: "8px 9px", marginBottom: 7 }}>
                    <div style={{ height: 5, width: "55%", background: p.lo, borderRadius: 3, opacity: 0.6 }} />
                    <div style={{ height: 9, width: "75%", background: p.hi, borderRadius: 3, margin: "6px 0 8px" }} />
                    <div style={{ display: "flex", gap: 5 }}>
                      <div style={{ flex: 1, height: 14, background: p.gold, borderRadius: 5 }} />
                      <div style={{ width: 14, height: 14, background: p.card2, border: `1px solid ${p.line}`, borderRadius: 5 }} />
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span style={{ color: p.hi, fontSize: 13, fontWeight: 700 }}>{sk.name}</span>
                    {on && <Check size={15} color={p.gold} strokeWidth={3} />}
                  </div>
                </div>
              </button>
            );
          })}
        </div>
        <div style={{ color: T.lo, fontSize: 11, marginTop: 8, lineHeight: 1.6 }}>ホーム右上の🎨ボタンでも次々切り替えて見比べられます。</div>
      </Field>
      <Field s={s} T={T} label="所持金のスタート金額">
        <NumInput s={s} value={String(data.settings.startCash || "")} placeholder="例：50000"
          onChange={(v) => setData((d) => ({ ...d, settings: { ...d.settings, startCash: parseInt(v, 10) || 0 } }))} />
        <div style={{ color: T.lo, fontSize: 11, marginTop: 8, lineHeight: 1.6 }}>所持金 ＝ スタート金額 ＋ 収入 − 支出 − リストの取り置き分。{"\n"}ホームとリストタブに表示されます。今の手持ちに合わせたいときは、この金額を調整してください。</div>
      </Field>
      <Field s={s} T={T} label="買い物リストのクーリングオフ期間">
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {[3, 5, 7, 10, 14].map((n) => {
            const on = (data.settings.coolDays ?? 7) === n;
            return (
              <button key={n} style={{ ...s.catChip, ...(on ? { background: T.gold + "20", borderColor: T.gold, color: T.hi } : {}) }}
                onClick={() => setData((d) => ({ ...d, settings: { ...d.settings, coolDays: n } }))}>
                {n}日
              </button>
            );
          })}
        </div>
        <div style={{ color: T.lo, fontSize: 11, marginTop: 8, lineHeight: 1.6 }}>リストに追加してからこの日数は「冷却中」になり、明けると「まだ欲しい？」の確認が出ます。</div>
      </Field>
      <Field s={s} T={T} label="データ（端末内に保存されています）">
        <div style={{ display: "flex", gap: 10 }}>
          <button style={{ ...s.btnGhost, flex: 1 }} onClick={exportData}><Download size={16} /> 書き出し</button>
          <label style={{ ...s.btnGhost, flex: 1, cursor: "pointer" }}><Upload size={16} /> 読み込み<input type="file" accept="application/json" style={{ display: "none" }} onChange={importData} /></label>
        </div>
      </Field>
      <button style={{ ...s.btnGhost, width: "100%", color: T.neg, borderColor: T.neg + "55" }}
        onClick={() => { if (confirm("すべてのデータを消去します。よろしいですか？")) { setData(seed()); close(); } }}>
        <Trash2 size={16} /> すべてのデータを消去
      </button>
      <div style={{ color: T.lo, fontSize: 11, textAlign: "center", marginTop: 16, lineHeight: 1.7 }}>つもりキャッシュ v1{"\n"}データはこの端末のブラウザ内だけに保存されます。{"\n"}機種変更の前は「書き出し」でバックアップを。</div>
    </>
  );
}

function SheetHead({ s, T, title, close, onDelete }) {
  return (
    <div style={s.sheetHead}>
      <div style={s.sheetTitle}>{title}</div>
      <div style={{ display: "flex", gap: 6 }}>
        {onDelete && <button style={s.iconBtn} onClick={onDelete} aria-label="削除"><Trash2 size={18} color={T.neg} /></button>}
        <button style={s.iconBtn} onClick={close} aria-label="閉じる"><X size={20} color={T.lo} /></button>
      </div>
    </div>
  );
}

function SectionTitle({ s, T, children }) { return <div style={s.sectionTitle}>{children}</div>; }

function buzz(p = 12) { try { navigator.vibrate?.(p); } catch (e) {} }
